<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes informations – Web4All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">Web4All</span>
    <div class="burger" aria-label="Menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="page-wrapper">

    <h1 class="page-title fade-in">Mes informations</h1>

    <form id="updateForm" class="update-form" novalidate>

      <div class="field fade-in" style="animation-delay:.1s">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" value="Kahlouche" required />
      </div>

      <div class="field fade-in" style="animation-delay:.15s">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" value="Faouzi" required />
      </div>

      <div class="field fade-in" style="animation-delay:.2s">
        <label for="email">Adresse mail professionnelle</label>
        <input type="email" id="email" name="email" value="faouzi.kahlouche@web4all.com" required />
      </div>

      <div class="field fade-in" style="animation-delay:.25s">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••••••" />
      </div>

      <div class="actions fade-in" style="animation-delay:.35s">
        <button type="submit" class="btn btn-primary">Mettre à jour</button>
      </div>

    </form>

  </div>

  <script>
    // Burger menu toggle
    const burger = document.querySelector('.burger');
    burger.addEventListener('click', () => {
      const spans = burger.querySelectorAll('span');
      burger.classList.toggle('open');
      if (burger.classList.contains('open')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
      } else {
        spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
      }
    });

    // Validation et soumission
    document.getElementById('updateForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const required = this.querySelectorAll('[required]');
      let valid = true;
      required.forEach(el => {
        el.style.borderColor = '';
        if (!el.value.trim()) {
          el.style.borderColor = 'var(--error)';
          valid = false;
        }
      });
      if (valid) alert('Informations mises à jour avec succès !');
    });
  </script>

</body>
</html>
