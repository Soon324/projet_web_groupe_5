<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppression du compte – Web4All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">Web4All</span>
    <div class="burger" aria-label="Menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="page-wrapper">

    <h1 class="page-title fade-in">Suppression du compte</h1>

    <p class="delete-warning fade-in" style="animation-delay:.1s">
      L'action sera irréversible, êtes-vous sûrs que vous souhaitez supprimer ce compte ?
    </p>

    <div class="actions fade-in" style="animation-delay:.2s">
      <a href="compte-etudiant.html" class="btn btn-primary">Non, annuler</a>
      <a href="suppression-compte-2.html" class="btn btn-outline-primary">Oui, supprimer</a>
    </div>

  </div>

  <script>
    const burger = document.querySelector('.burger');
    burger.addEventListener('click', () => {
      const spans = burger.querySelectorAll('span');
      burger.classList.toggle('open');
      if (burger.classList.contains('open')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
      } else {
        spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
      }
    });
  </script>

</body>
</html>
