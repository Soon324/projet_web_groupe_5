<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon compte – Web4All</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">Web4All</span>
    <div class="burger" aria-label="Menu" role="button" tabindex="0">
      <span></span><span></span><span></span>
    </div>
  </nav>

  <div class="page-wrapper">

    <!-- EN-TÊTE PROFIL -->
    <div class="profile-header">
      <div class="profile-info">
        <p class="profile-name">DIEMUNSCH Nicolas</p>
        <p class="profile-role">Étudiant</p>
      </div>
      <div class="profile-avatar" aria-hidden="true">
        <!-- Icône profil SVG -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
    </div>

    <!-- MENU DU COMPTE -->
    <nav class="account-menu" aria-label="Menu du compte">
      <a href="modification-compte-etudiant.html" class="account-menu-item">Mes informations</a>
      <a href="#" class="account-menu-item">Posts et activité</a>
      <a href="suppression-compte-1.html" class="account-menu-item danger">Supprimer ce compte</a>
    </nav>

  </div>

  <script>
    // Burger menu toggle
    const burger = document.querySelector('.burger');
    burger.addEventListener('click', () => {
      const spans = burger.querySelectorAll('span');
      burger.classList.toggle('open');
      if (burger.classList.contains('open')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
      } else {
        spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
      }
    });

  </script>

</body>
</html>
